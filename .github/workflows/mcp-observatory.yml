name: MCP Observatory

on:
  pull_request:
  push:
    branches: [master]

jobs:
  mcp-observatory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: KryptosAI/mcp-observatory/action@main
        with:
          target: mcp-observatory.target.json
          deep: true
          security: true
          comment-on-pr: true
